name: Deploy to main branch
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploying to Production Server
    runs-on: ubuntu-latest
    environment: prod
    env:
      IMAGE_NAME: tickin-api-prod
      CONTAINER_NAME: tickin-api-prod
      DEPLOY_PATH: /home/ubuntu/tickin-api/hcm-backend

    steps:
      # =========================
      # 1. Setup SSH key
      # =========================
      - name: Setup SSH
        run: |
          # Fail fast with a clear message if any secret is missing
          if [ -z "${{ secrets.HOST }}" ];     then echo "::error::HOST secret is missing or empty";     exit 1; fi
          if [ -z "${{ secrets.USERNAME }}" ]; then echo "::error::USERNAME secret is missing or empty"; exit 1; fi
          if [ -z "${{ secrets.SSH_KEY }}" ];  then echo "::error::SSH_KEY secret is missing or empty";  exit 1; fi

          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Drop the silent stderr redirect so the next failure is visible
          if ! ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan failed — is ${{ secrets.HOST }} reachable on port 22?"
            exit 1
          fi

      # =========================
      # 2. Deploy on remote server
      # =========================
      - name: Deploy on remote server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "${{ secrets.USERNAME }}@${{ secrets.HOST }}" \
              bash -s -- "${IMAGE_NAME}" "${CONTAINER_NAME}" "${DEPLOY_PATH}" << 'ENDSSH'
          set -e
          IMAGE_NAME="$1"
          CONTAINER_NAME="$2"
          DEPLOY_PATH="$3"

          cd "$DEPLOY_PATH"

          echo "=== Reclaim disk BEFORE build (prevents repeat 'no space left' failures) ==="
          # A failed deploy leaves an orphaned build image; the end-of-run cleanup
          # only fires on success, so failures used to compound until the disk hit
          # 100%. Prune dangling images + stopped containers + build cache up front.
          # -f (no -a) keeps the RUNNING prod + mysql images and never touches volumes.
          docker container prune -f || true
          docker image prune -f     || true
          docker builder prune -f   || true
          df -h / || true

          echo "=== Pull latest code ==="
          git fetch origin main
          git reset --hard origin/main

          echo "=== Build new image ==="
          docker build --no-cache -t "$IMAGE_NAME:new" .

          echo "=== Cleanup old candidate ==="
          docker rm -f "${CONTAINER_NAME}-candidate" || true

          echo "=== Start candidate container (no traffic) ==="
          docker run -d \
            --name "${CONTAINER_NAME}-candidate" \
            --env-file .env \
            --network tickin \
            --log-opt max-size=10m --log-opt max-file=3 \
            "$IMAGE_NAME:new"

          echo "=== Wait for healthcheck ==="
          HEALTHY=0
          for i in {1..25}; do
            STATUS=$(docker inspect \
              --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' \
              "${CONTAINER_NAME}-candidate")
            echo "Status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Candidate is healthy ✓"
              HEALTHY=1
              break
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Candidate became unhealthy ✗"
              docker logs "${CONTAINER_NAME}-candidate" --tail 50 || true
              docker rm -f "${CONTAINER_NAME}-candidate" || true
              exit 1
            fi
            sleep 5
          done

          if [ "$HEALTHY" -ne 1 ]; then
            echo "Healthcheck timeout ✗"
            docker logs "${CONTAINER_NAME}-candidate" --tail 50 || true
            docker rm -f "${CONTAINER_NAME}-candidate" || true
            exit 1
          fi

          echo "=== Switching to new version ==="
          docker stop "$CONTAINER_NAME" || true
          docker rm   "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --env-file .env \
            --network tickin \
            -p 4001:4001 \
            --log-opt max-size=10m --log-opt max-file=3 \
            "$IMAGE_NAME:new"
          docker rm -f "${CONTAINER_NAME}-candidate" || true

          echo "=== Running containers ==="
          docker ps

          echo "=== Logs ==="
          docker logs "$CONTAINER_NAME" --tail 50 || true

          echo "=== Cleanup old images + build cache (prevents disk fill) ==="
          # Each build re-tags ":new", so the PREVIOUS image becomes an untagged
          # (dangling) layer that the old 'docker images <name>' filter never saw —
          # that's how the disk silently filled to 100% (247 dangling images).
          # Prune everything not used by a RUNNING container, plus build cache.
          # This never touches volumes, so the MySQL data is safe.
          docker image prune -af || true
          docker builder prune -f || true
          docker system df || true
          ENDSSH

      # =========================
      # 3. Cleanup local SSH key
      # =========================
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
